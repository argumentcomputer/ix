[package]
name = "zisk-guest"
version = "0.1.0"
edition = "2024"

[dependencies]
ixon = { path = "../../crates/ixon" }
ix-kernel = { path = "../../crates/kernel" }
ix-common = { path = "../../crates/common" }
# Drop every `log::*!` macro call (info / debug / trace / warn / error) from
# the guest binary at compile time. The kernel emits diagnostic info via
# `log::info!` â€” none of it is reachable from a Zisk guest (no stderr) and
# the formatting machinery was ~45-55 % of cycles in the profile.
log = { version = "0.4", features = ["max_level_off"] }
# argumentcomputer/zisk fork â€” `blake3-precompile-v0.17` exposes the Blake3
# compression precompile via `ziskos::zisklib::blake3`, plus a `name = "blake3"`
# drop-in crate at `ziskos/blake3/` which the `[patch.crates-io]` below routes
# every `blake3::Hasher` / `blake3::hash` call through.
#
# `default-features = false` drops `user-hints`, which pulls in
# `zisk-common â†’ proofman â†’ blake3`. Once `blake3` is patched to the
# precompile shim (which itself depends on `ziskos`), `user-hints` makes the
# dep graph cyclic.
#
# Default bump allocator (`ziskos/entrypoint/src/alloc/bump.rs`). TLSF
# was tried â€” `zisk-embedded-tlfs-alloc` â€” to let
# `kenv.clear_releasing_memory()` actually return memory to the
# allocator for envs whose cumulative bump high-water mark would exceed
# 512 MB guest RAM. Profiling on String.append showed TLSF
# `alloc`+`dealloc` at ~36 % of total cost (879k alloc/dealloc pairs for
# 306 constants); bump is significantly cheaper per cycle. The
# trade-off: bump's high-water mark grows monotonically, so envs
# requiring memory recycling (>~500 constants empirically) hit the RAM
# wall. Init still doesn't fit on either allocator (MT-trace shmem
# ceiling, not allocator pressure).
ziskos = { git = "https://github.com/argumentcomputer/zisk.git", branch = "blake3-precompile", default-features = false, features = ["zisk-embedded-dlmalloc-alloc"] }

# Redirect every `blake3::*` use across the kernel dep tree to the
# precompile-backed `blake3` shim that ships in the Zisk fork
# (`ziskos/blake3/`, package `name = "blake3"`). Scoped to the guest
# workspace so host builds keep using upstream blake3.
#
# Both `blake3` (shim) and `ziskos` now resolve to the SAME git source
# (`blake3-precompile` branch): the shim depends on `ziskos` via
# `path = "../entrypoint"` within that checkout, and the guest's `ziskos`
# above points at the same branch â€” so cargo unifies them into one `ziskos`
# instance (single `#[global_allocator]`). No `[patch."...zisk.git"]`
# override is needed now that the shim is published on the branch.
[patch.crates-io]
blake3 = { git = "https://github.com/argumentcomputer/zisk.git", branch = "blake3-precompile", package = "blake3" }
