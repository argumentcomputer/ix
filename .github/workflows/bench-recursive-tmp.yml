name: Recursive verifier benchmark (temporary)

# TEMPORARY: sizing probe for the aiur `recursive` cell — the IxVM recursive
# verifier needs >40 GB locally (the in-circuit verifier execution over a
# ~2.2 MB kernel proof), so run it once per push on a 128 GB warp host to
# learn whether it fits the CI ceiling and what it costs. One cheap constant
# suffices: the proof size — and so the recursion cost — is set by the kernel's
# circuit count, not the constant (HEq --skip-deps proves byte-identical
# 2221045-byte proofs). Delete this file once the recursive cell either joins
# bench-main.yml or is redesigned around the interpreter's memory.

on:
  push:
    branches: [sb/aiur-recursive-bench]
  workflow_dispatch:

permissions:
  contents: read

# Experimental probe: a newer push obsoletes an in-flight run.
concurrency:
  group: bench-recursive-${{ github.ref }}
  cancel-in-progress: true

jobs:
  recursive:
    runs-on: warp-ubuntu-latest-x64-32x
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      # Log the host so the RAM/time numbers can be traced to it.
      - name: Log host CPU/RAM
        run: |
          lscpu
          free -g
      - uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: true
          build-args: "ix --wfail -v"
      - run: lake build bench-typecheck
      # The InitStd library env must be built before `ix compile` (inside the
      # cell's ensureIxe) can import it — same order as bench-main's compile
      # job, minus the mathlib cache InitStd doesn't need.
      - run: lake build CompileInitStd
        working-directory: Benchmarks/Compile
      # The full recursive cell under the RAM watchdog (default ceiling: host
      # RAM − 15 GB ≈ 108 GB): compile InitStd.ixe, prove HEq, execute the
      # in-circuit verifier over the proof, then prove the verifier. An OOM
      # kill lands as a `status: oom` row that keeps whatever was flushed
      # (prove metrics, and recursive-time/recursive-fft-cost if the execute
      # finished) — the artifact tells the story either way.
      - name: Run recursive cell (HEq)
        run: |
          .lake/build/bin/ix bench run --backend aiur --env InitStd \
            --mode recursive --consts HEq --out bench.json
      - name: Show rows
        if: ${{ !cancelled() }}
        run: cat bench.json
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: recursive-bench
          path: bench.json
