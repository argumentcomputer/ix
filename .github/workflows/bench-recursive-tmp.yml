name: Recursive verifier benchmark (temporary)

# TEMPORARY: the Blake3 side of the Keccak-vs-Blake3 recursion comparison,
# on the same 128 GB warp host class the Keccak probe uses
# (sb/keccak-recursive-bench's bench-keccak-recursive-tmp.yml), via the same
# `ix bench run` orchestration every !benchmark cell uses: the `recursive`
# backend runs bench-recursive-verifier once per fixed config (floor:
# square/1-query/blowup-1 — the only config Keccak completes, at 80 GB;
# standard: factorial/3-queries/blowup-2) under the RAM watchdog, each row
# self-reported through the results contract (an OOM kill lands as a
# `status: oom` row keeping the execute-side metrics). Blake3 is expected to
# complete both comfortably (~2.6 / ~6.8 GB locally).
#
# An earlier revision of this workflow answered the IxVM-scale sizing
# question: the recursive Typecheck cell (HEq over InitStd) OOMs at the
# ~108 GB ceiling in the verifier-execute phase. Delete the file once the
# comparison datapoints are recorded (the recursive cell itself can then
# join bench-main.yml).

on:
  push:
    branches: [sb/aiur-recursive-bench]
  workflow_dispatch:

permissions:
  contents: read

# Experimental probe: a newer push obsoletes an in-flight run.
concurrency:
  group: bench-recursive-${{ github.ref }}
  cancel-in-progress: true

jobs:
  recursive:
    runs-on: warp-ubuntu-latest-x64-32x
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      # Log the host so the RAM/time numbers can be traced to it.
      - name: Log host CPU/RAM
        run: |
          lscpu
          free -g
      - uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: true
          build-args: "ix --wfail -v"
      - run: lake build bench-recursive-verifier
      - name: Run the recursive cell
        run: |
          ./.lake/build/bin/ix bench run --backend recursive --out bench.json
      - name: Show rows
        if: ${{ !cancelled() }}
        run: cat bench.json
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: recursive-bench
          path: bench.json
