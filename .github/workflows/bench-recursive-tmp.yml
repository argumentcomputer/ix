name: Recursive verifier benchmark (temporary)

# TEMPORARY: the Blake3 side of the Keccak-vs-Blake3 recursion comparison,
# on the same 128 GB warp host class the Keccak probe used
# (sb/keccak-recursive-bench's bench-keccak-recursive-tmp.yml) so the table
# is apples-to-apples: the toy bench at the floor config (square, 1 query,
# blowup 1 — the only one Keccak completes, at 80 GB) and the standard
# config (factorial, 3 queries, blowup 2 — where Keccak OOMs). Blake3 is
# expected to complete both comfortably (~2.6 / ~6.8 GB locally).
#
# The earlier revision of this workflow answered the IxVM-scale sizing
# question: the recursive Typecheck cell (HEq over InitStd) OOMs at the
# ~108 GB ceiling in the verifier-execute phase. Delete the file once the
# comparison datapoints are recorded.

on:
  push:
    branches: [sb/aiur-recursive-bench]
  workflow_dispatch:

permissions:
  contents: read

# Experimental probe: a newer push obsoletes an in-flight run.
concurrency:
  group: bench-recursive-${{ github.ref }}
  cancel-in-progress: true

jobs:
  recursive:
    runs-on: warp-ubuntu-latest-x64-32x
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      # Log the host so the RAM/time numbers can be traced to it.
      - name: Log host CPU/RAM
        run: |
          lscpu
          free -g
      - uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: true
          build-args: "bench-recursive-verifier --wfail -v"
      # Watchdog ceiling: host RAM minus 15 GB (same rule as ix bench run);
      # the sampler logs the RSS high-water either way.
      - name: Run Blake3 recursive floor (square, q=1, b=1)
        run: |
          ceiling_gb=$(( $(grep MemTotal /proc/meminfo | awk '{print $2}') / 1024 / 1024 - 15 ))
          echo "watchdog ceiling: ${ceiling_gb} GB"
          ./.github/scripts/watchdog.sh "$ceiling_gb" \
            ./.lake/build/bin/bench-recursive-verifier --trivial --queries 1 --blowup 1 &
          pid=$!
          ( while kill -0 "$pid" 2>/dev/null; do
              ps -eo rss,comm | grep bench-recursive | awk '{print $1}'
              sleep 5
            done ) > rss.log || true
          wait "$pid"; code=$?
          peak_kb=$(sort -n rss.log | tail -1)
          echo "exit=${code} peak-rss=$(( ${peak_kb:-0} / 1024 / 1024 )) GB (${peak_kb:-0} kB)"
          exit "$code"
      - name: Run standard config (factorial, q=3, b=2)
        run: |
          ceiling_gb=$(( $(grep MemTotal /proc/meminfo | awk '{print $2}') / 1024 / 1024 - 15 ))
          echo "watchdog ceiling: ${ceiling_gb} GB"
          ./.github/scripts/watchdog.sh "$ceiling_gb" \
            ./.lake/build/bin/bench-recursive-verifier &
          pid=$!
          ( while kill -0 "$pid" 2>/dev/null; do
              ps -eo rss,comm | grep bench-recursive | awk '{print $1}'
              sleep 5
            done ) > rss-std.log || true
          wait "$pid"; code=$?
          peak_kb=$(sort -n rss-std.log | tail -1)
          echo "exit=${code} peak-rss=$(( ${peak_kb:-0} / 1024 / 1024 )) GB (${peak_kb:-0} kB)"
          exit "$code"
