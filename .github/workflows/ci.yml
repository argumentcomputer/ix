name: CI Jobs

on:
  push:
    branches: main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lean-test:
    runs-on: warp-ubuntu-latest-x64-16x
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: leanprover/lean-action@v1
        with:
          build-args: "--wfail -v"
      # build-all lint driver compiles every lib/exe target with --wfail, so a
      # warning in any target (exes, benchmarks, Apps) — not just the default lib
      # lean-action builds above — fails CI.
      - name: Build all targets
        run: lake lint -- --wfail -v
      - name: Check codegen'd IxVM kernel is up to date
        run: lake exe ix codegen --check
      - name: Test Ix CLI
        run: lake test --wfail -- cli
      - name: Aiur tests
        run: lake test --wfail -- --ignored aiur aiur-hashes ixvm multi-stark recursive-verifier
      - name: Check Lean versions match for Ix and compiler bench
        run: diff lean-toolchain Benchmarks/Compile/lean-toolchain

  rust-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: taiki-e/install-action@nextest
      # Install Lean for rust-bindgen step
      - uses: leanprover/lean-action@v1
        with:
          auto-config: false
          use-github-cache: false
      - name: Check Rustfmt code style
        uses: actions-rust-lang/rustfmt@v1
      - name: Check clippy warnings
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Check *everything* compiles
        run: cargo check --all-targets --all-features --workspace
      - name: Tests
        run: cargo nextest run --release --profile ci --workspace --run-ignored all
      - name: Get Rust version
        run: |
          echo "RUST_VERSION=$(awk -F '"' '/^channel/ {print $2}' rust-toolchain.toml)" | tee -a $GITHUB_ENV
      - name: Cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          rust-version: ${{ env.RUST_VERSION }}
