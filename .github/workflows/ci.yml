name: CI Jobs

on:
  push:
    branches: main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lean-test:
    runs-on: warp-ubuntu-latest-x64-16x
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
      - uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1
        with:
          build-args: "--wfail -v"
      - name: Test Ix CLI
        run: lake test -- cli
      - name: Aiur tests
        run: lake test -- --ignored aiur aiur-hashes ixvm
      - name: Check Lean versions match for Ix and compiler bench
        run: diff lean-toolchain Benchmarks/Compile/lean-toolchain

  rust-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
      - uses: taiki-e/install-action@0631aa6515c7d545823c67cfae7ef4fc7f490154 # v2
        with:
          tool: nextest
      # Install Lean for rust-bindgen step
      - uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1
        with:
          auto-config: false
          use-github-cache: false
      - name: Check Rustfmt code style
        uses: actions-rust-lang/rustfmt@4066006ec54a31931b9b1fddfd38f2fdf2d27143 # v1
      - name: Check clippy warnings
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Check *everything* compiles
        run: cargo check --all-targets --all-features --workspace
      - name: Tests
        run: cargo nextest run --release --profile ci --workspace --run-ignored all
      - name: Get Rust version
        run: |
          echo "RUST_VERSION=$(awk -F '"' '/^channel/ {print $2}' rust-toolchain.toml)" | tee -a $GITHUB_ENV
      - name: Cargo-deny
        uses: EmbarkStudios/cargo-deny-action@8f84122a46a358a27cb0625d85ad60ab436a1b87 # v2
        with:
          rust-version: ${{ env.RUST_VERSION }}
