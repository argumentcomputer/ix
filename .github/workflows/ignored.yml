name: Extended CI tests

on:
  push:
    branches: main
  workflow_dispatch:

permissions:
  contents: read

# No concurrency group: push-to-main and manual dispatch only — every merged
# commit runs the extended tests; a later merge must never cancel an in-flight
# run.

jobs:
  ignored-test:
    runs-on: warp-ubuntu-latest-x64-32x
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      # Only restore the cache, since `ci.yml` will save the test binary to the cache first
      - uses: actions/cache/restore@v6
        with:
          path: .lake
          key: lake-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lake-manifest.json') }}-${{ github.sha }}
          restore-keys: lake-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lake-manifest.json') }}
      - uses: leanprover/lean-action@v1
        with:
          auto-config: false
          # `test-args` is currently broken, so we run `lake test` separately
          # Restore once https://github.com/leanprover/lean-action/pull/153 is merged
          # test: true
          # test-args: "-- --ignored"
          use-github-cache: false
      - run: lake test -- --ignored
      - run: lake exe Apps.ZKVoting.Prover

  valgrind-ffi:
    runs-on: warp-ubuntu-latest-x64-8x
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      # Only restore the cache, since `ci.yml` will save the test binary to the cache first
      - uses: actions/cache/restore@v6
        with:
          path: .lake
          key: lake-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lake-manifest.json') }}-${{ github.sha }}
          restore-keys: lake-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lake-manifest.json') }}
      - uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: true
          build-args: "IxTests"
          use-github-cache: false
      - name: Install valgrind
        run: |
          # Some warpbuild images ship a mirrorlist with an unreachable
          # azure.archive.ubuntu.com entry, causing apt-get update to stall indefinitely.
          sudo sed -i '/azure\.archive\.ubuntu\.com/d' /etc/apt/apt-mirrors.txt 2>/dev/null || true
          sudo apt-get update
          sudo apt-get install -y valgrind
      - name: Run tests under valgrind
        run: |
          valgrind \
            --leak-check=full \
            --show-leak-kinds=definite,possible \
            --errors-for-leak-kinds=definite \
            --track-origins=yes \
            --error-exitcode=1 \
            --suppressions=.github/valgrind.supp \
            .lake/build/bin/IxTests -- ffi
